<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <text x="490" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Shopify Analytics Pipeline — Data Flow &amp; Lifecycle</text>

  <!-- ===== DATA FLOW (top section) ===== -->

  <!-- Storefront Events -->
  <rect x="20" y="60" width="140" height="65" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="90" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Storefront</text>
  <text x="90" y="106" text-anchor="middle" font-size="11" fill="#92400e">User Events</text>

  <line x1="160" y1="92" x2="195" y2="92" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Kinesis -->
  <rect x="205" y="60" width="150" height="65" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="280" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">Kinesis Data</text>
  <text x="280" y="106" text-anchor="middle" font-size="11" fill="#9d174d">Firehose</text>

  <line x1="355" y1="92" x2="395" y2="92" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 Raw -->
  <rect x="405" y="55" width="170" height="75" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="490" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">S3 Bucket</text>
  <text x="490" y="100" text-anchor="middle" font-size="12" fill="#1e40af">raw/</text>
  <text x="490" y="116" text-anchor="middle" font-size="10" fill="#3b82f6">JSON / Parquet</text>

  <line x1="490" y1="130" x2="490" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Glue ETL -->
  <rect x="405" y="170" width="170" height="60" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="490" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">AWS Glue</text>
  <text x="490" y="214" text-anchor="middle" font-size="11" fill="#4338ca">ETL Jobs</text>

  <line x1="575" y1="200" x2="625" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 Processed -->
  <rect x="635" y="165" width="170" height="75" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="720" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">S3 Bucket</text>
  <text x="720" y="210" text-anchor="middle" font-size="12" fill="#1e40af">processed/</text>
  <text x="720" y="226" text-anchor="middle" font-size="10" fill="#3b82f6">Aggregated Tables</text>

  <!-- Arrow down to Athena -->
  <line x1="805" y1="200" x2="845" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Athena -->
  <rect x="855" y="110" width="110" height="120" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="910" y="160" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">AWS</text>
  <text x="910" y="178" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Athena</text>
  <text x="910" y="196" text-anchor="middle" font-size="11" fill="#15803d">SQL Queries</text>

  <!-- Athena query results arrow (left) -->
  <line x1="855" y1="140" x2="575" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="575" y1="140" x2="575" y2="160" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Athena Results -->
  <rect x="505" y="260" width="160" height="50" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="585" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">athena-results/</text>
  <text x="585" y="298" text-anchor="middle" font-size="10" fill="#64748b">Expire after 7 days</text>

  <!-- Arrow from Athena to results -->
  <line x1="910" y1="230" x2="910" y2="285" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="910" y1="285" x2="665" y2="285" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Dashboard -->
  <rect x="855" y="250" width="110" height="60" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="910" y="275" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Store Owner</text>
  <text x="910" y="293" text-anchor="middle" font-size="11" fill="#92400e">Dashboard</text>

  <!-- Arrow Athena to Dashboard -->
  <line x1="930" y1="230" x2="930" y2="240" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== LIFECYCLE RULES (bottom section) ===== -->

  <rect x="20" y="340" width="940" height="225" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="490" y="370" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">S3 Lifecycle Rules</text>

  <!-- Raw lifecycle -->
  <rect x="40" y="385" width="430" height="75" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="55" y="408" font-size="13" font-weight="600" fill="#1e40af">raw/</text>

  <rect x="95" y="395" width="68" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="129" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Standard</text>
  <text x="129" y="438" text-anchor="middle" font-size="9" fill="#64748b">0–7d</text>

  <line x1="163" y1="409" x2="176" y2="409" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="186" y="395" width="55" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="213" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Std-IA</text>
  <text x="213" y="438" text-anchor="middle" font-size="9" fill="#64748b">7–90d</text>

  <line x1="241" y1="409" x2="254" y2="409" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="264" y="395" width="68" height="28" rx="5" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="298" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#0e7490">Glacier FR</text>
  <text x="298" y="438" text-anchor="middle" font-size="9" fill="#64748b">90–365d</text>

  <line x1="332" y1="409" x2="345" y2="409" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="355" y="395" width="75" height="28" rx="5" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="392" y="413" text-anchor="middle" font-size="9" font-weight="600" fill="#0369a1">Deep Archive</text>
  <text x="392" y="438" text-anchor="middle" font-size="9" fill="#64748b">365d–3yr</text>

  <line x1="430" y1="409" x2="440" y2="409" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <text x="455" y="414" font-size="13" fill="#ef4444">Delete</text>

  <!-- Processed lifecycle -->
  <rect x="40" y="475" width="430" height="75" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="55" y="498" font-size="13" font-weight="600" fill="#1e40af">processed/</text>

  <rect x="125" y="485" width="80" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="165" y="503" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Standard</text>
  <text x="165" y="528" text-anchor="middle" font-size="9" fill="#64748b">0–180d</text>

  <line x1="205" y1="499" x2="225" y2="499" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="235" y="485" width="55" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="262" y="503" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Std-IA</text>
  <text x="262" y="528" text-anchor="middle" font-size="9" fill="#64748b">180–365d</text>

  <line x1="290" y1="499" x2="310" y2="499" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="320" y="485" width="68" height="28" rx="5" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="354" y="503" text-anchor="middle" font-size="9" font-weight="600" fill="#0e7490">Glacier IR</text>
  <text x="354" y="528" text-anchor="middle" font-size="9" fill="#64748b">365–730d</text>

  <line x1="388" y1="499" x2="405" y2="499" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <text x="420" y="504" font-size="13" fill="#ef4444">Expire</text>

  <!-- Legend -->
  <rect x="520" y="395" width="420" height="140" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="540" y="420" font-size="12" font-weight="600" fill="#475569">Queryable by Athena</text>

  <rect x="540" y="432" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="560" y="443" font-size="11" fill="#64748b">Standard / Standard-IA — instant, low latency</text>

  <rect x="540" y="454" width="12" height="12" rx="2" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="560" y="465" font-size="11" fill="#64748b">Glacier IR — instant, archive pricing</text>

  <text x="540" y="492" font-size="12" font-weight="600" fill="#475569">Not queryable by Athena</text>

  <rect x="540" y="502" width="12" height="12" rx="2" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="560" y="513" font-size="11" fill="#64748b">Glacier FR / Deep Archive — requires manual restore</text>
</svg>