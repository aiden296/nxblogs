<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <text x="550" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Shopify Analytics Pipeline — Data Flow &amp; Lifecycle</text>

  <!-- ===== DATA FLOW (top section) ===== -->

  <!-- Storefront -->
  <rect x="30" y="70" width="155" height="68" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="107" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">Storefront</text>
  <text x="107" y="116" text-anchor="middle" font-size="11" fill="#92400e">User Events</text>

  <line x1="185" y1="104" x2="240" y2="104" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Kinesis -->
  <rect x="250" y="70" width="165" height="68" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="332" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">Kinesis Data</text>
  <text x="332" y="116" text-anchor="middle" font-size="11" fill="#9d174d">Firehose</text>

  <line x1="415" y1="104" x2="475" y2="104" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 Raw -->
  <rect x="485" y="62" width="185" height="82" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="577" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">S3 Bucket</text>
  <text x="577" y="110" text-anchor="middle" font-size="12" fill="#1e40af">raw/</text>
  <text x="577" y="128" text-anchor="middle" font-size="10" fill="#3b82f6">JSON / Parquet</text>

  <line x1="577" y1="144" x2="577" y2="198" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Glue ETL -->
  <rect x="485" y="208" width="185" height="65" rx="10" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="577" y="236" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">AWS Glue</text>
  <text x="577" y="254" text-anchor="middle" font-size="11" fill="#4338ca">ETL Jobs</text>

  <line x1="670" y1="240" x2="740" y2="240" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- S3 Processed -->
  <rect x="750" y="200" width="185" height="82" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="842" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">S3 Bucket</text>
  <text x="842" y="248" text-anchor="middle" font-size="12" fill="#1e40af">processed/</text>
  <text x="842" y="264" text-anchor="middle" font-size="10" fill="#3b82f6">Aggregated Tables</text>

  <line x1="935" y1="240" x2="985" y2="240" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Athena -->
  <rect x="995" y="170" width="80" height="140" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="1035" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">AWS</text>
  <text x="1035" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">Athena</text>
  <text x="1035" y="261" text-anchor="middle" font-size="10" fill="#15803d">SQL Queries</text>

  <!-- Athena to Dashboard -->
  <line x1="1035" y1="310" x2="1035" y2="345" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dashboard -->
  <rect x="975" y="355" width="120" height="65" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="1035" y="383" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Store Owner</text>
  <text x="1035" y="401" text-anchor="middle" font-size="11" fill="#92400e">Dashboard</text>

  <!-- Athena Results -->
  <rect x="620" y="345" width="170" height="55" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="705" y="370" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">athena-results/</text>
  <text x="705" y="386" text-anchor="middle" font-size="10" fill="#64748b">Expire after 7 days</text>

  <!-- Arrow from Athena to athena-results -->
  <line x1="995" y1="290" x2="950" y2="290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="950" y1="290" x2="950" y2="372" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <line x1="950" y1="372" x2="790" y2="372" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- ===== LIFECYCLE RULES (bottom section — vertical layout) ===== -->

  <rect x="30" y="440" width="1040" height="365" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="550" y="475" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">S3 Lifecycle Rules</text>

  <!-- Raw lifecycle -->
  <rect x="50" y="495" width="1000" height="80" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="80" y="530" font-size="14" font-weight="600" fill="#1e40af">raw/</text>

  <rect x="140" y="515" width="80" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="534" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Standard</text>
  <text x="180" y="558" text-anchor="middle" font-size="10" fill="#64748b">0–7d</text>

  <line x1="220" y1="530" x2="260" y2="530" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="270" y="515" width="70" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="305" y="534" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Std-IA</text>
  <text x="305" y="558" text-anchor="middle" font-size="10" fill="#64748b">7–90d</text>

  <line x1="340" y1="530" x2="385" y2="530" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="395" y="515" width="85" height="30" rx="5" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="437" y="534" text-anchor="middle" font-size="10" font-weight="600" fill="#0e7490">Glacier FR</text>
  <text x="437" y="558" text-anchor="middle" font-size="10" fill="#64748b">90–365d</text>

  <line x1="480" y1="530" x2="525" y2="530" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="535" y="515" width="100" height="30" rx="5" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="585" y="534" text-anchor="middle" font-size="10" font-weight="600" fill="#0369a1">Deep Archive</text>
  <text x="585" y="558" text-anchor="middle" font-size="10" fill="#64748b">365d–3yr</text>

  <line x1="635" y1="530" x2="670" y2="530" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <text x="690" y="536" font-size="14" font-weight="600" fill="#ef4444">Delete</text>

  <!-- Processed lifecycle -->
  <rect x="50" y="595" width="1000" height="80" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="80" y="630" font-size="14" font-weight="600" fill="#1e40af">processed/</text>

  <rect x="170" y="615" width="80" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="210" y="634" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Standard</text>
  <text x="210" y="658" text-anchor="middle" font-size="10" fill="#64748b">0–180d</text>

  <line x1="250" y1="630" x2="300" y2="630" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="310" y="615" width="70" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="345" y="634" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">Std-IA</text>
  <text x="345" y="658" text-anchor="middle" font-size="10" fill="#64748b">180–365d</text>

  <line x1="380" y1="630" x2="430" y2="630" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="440" y="615" width="85" height="30" rx="5" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="482" y="634" text-anchor="middle" font-size="10" font-weight="600" fill="#0e7490">Glacier IR</text>
  <text x="482" y="658" text-anchor="middle" font-size="10" fill="#64748b">365–730d</text>

  <line x1="525" y1="630" x2="565" y2="630" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <text x="585" y="636" font-size="14" font-weight="600" fill="#ef4444">Expire</text>

  <!-- Legend -->
  <rect x="50" y="695" width="1000" height="95" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <text x="80" y="722" font-size="13" font-weight="600" fill="#475569">Queryable by Athena</text>
  <rect x="260" y="710" width="14" height="14" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="282" y="722" font-size="11" fill="#64748b">Standard / Standard-IA — instant, low latency</text>
  <rect x="580" y="710" width="14" height="14" rx="2" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="602" y="722" font-size="11" fill="#64748b">Glacier IR — instant, archive pricing</text>

  <text x="80" y="762" font-size="13" font-weight="600" fill="#475569">Not queryable by Athena</text>
  <rect x="260" y="750" width="14" height="14" rx="2" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
  <text x="282" y="762" font-size="11" fill="#64748b">Glacier FR / Deep Archive — requires manual restore</text>
</svg>
