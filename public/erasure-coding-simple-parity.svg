<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="400" fill="#f9fafb" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Simple Parity: Single Erasure Recovery</text>

  <!-- === TOP SECTION: Encoding === -->
  <text x="40" y="72" font-size="13" font-weight="600" fill="#6b7280">ENCODING</text>
  <line x1="40" y1="78" x2="760" y2="78" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Label -->
  <text x="400" y="100" text-anchor="middle" font-size="13" fill="#4b5563">p = d1 + d2 + d3 + d4</text>

  <!-- Data blocks row -->
  <rect x="80" y="115" width="80" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="120" y="136" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d1</text>
  <text x="120" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">3</text>

  <text x="177" y="146" text-anchor="middle" font-size="18" fill="#6b7280">+</text>

  <rect x="195" y="115" width="80" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="235" y="136" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d2</text>
  <text x="235" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">7</text>

  <text x="292" y="146" text-anchor="middle" font-size="18" fill="#6b7280">+</text>

  <rect x="310" y="115" width="80" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="136" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d3</text>
  <text x="350" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">1</text>

  <text x="407" y="146" text-anchor="middle" font-size="18" fill="#6b7280">+</text>

  <rect x="425" y="115" width="80" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="465" y="136" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d4</text>
  <text x="465" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">5</text>

  <!-- Arrow to parity -->
  <text x="527" y="146" text-anchor="middle" font-size="18" fill="#6b7280">=</text>

  <!-- Parity block -->
  <rect x="555" y="115" width="100" height="50" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="605" y="136" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">p</text>
  <text x="605" y="155" text-anchor="middle" font-size="18" font-weight="bold" fill="#f59e0b">16</text>

  <!-- === BOTTOM SECTION: Recovery === -->
  <text x="40" y="210" font-size="13" font-weight="600" fill="#6b7280">RECOVERY (d3 lost)</text>
  <line x1="40" y1="216" x2="760" y2="216" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Show blocks with d3 missing -->
  <rect x="50" y="235" width="70" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="256" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d1</text>
  <text x="85" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">3</text>

  <rect x="135" y="235" width="70" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="256" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d2</text>
  <text x="170" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">7</text>

  <!-- d3 missing -->
  <rect x="220" y="235" width="70" height="50" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="255" y="256" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">d3</text>
  <text x="255" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#ef4444">?</text>

  <rect x="305" y="235" width="70" height="50" rx="6" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="340" y="256" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">d4</text>
  <text x="340" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6">5</text>

  <rect x="390" y="235" width="70" height="50" rx="6" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="425" y="256" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">p</text>
  <text x="425" y="275" text-anchor="middle" font-size="18" font-weight="bold" fill="#f59e0b">16</text>

  <!-- Arrow -->
  <line x1="475" y1="260" x2="508" y2="260" stroke="#6b7280" stroke-width="2"/>
  <polygon points="508,254 508,266 520,260" fill="#6b7280"/>

  <!-- Recovery formula box -->
  <rect x="530" y="230" width="230" height="60" rx="8" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1.5"/>
  <text x="645" y="254" text-anchor="middle" font-size="12" fill="#4b5563">d3 = p - d1 - d2 - d4</text>
  <text x="645" y="275" text-anchor="middle" font-size="14" font-weight="bold" fill="#10b981">= 16 - 3 - 7 - 5 = 1</text>

  <!-- Recovered block -->
  <rect x="220" y="310" width="70" height="50" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <text x="255" y="331" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">d3</text>
  <text x="255" y="350" text-anchor="middle" font-size="18" font-weight="bold" fill="#10b981">1</text>

  <!-- Arrow from formula to recovered -->
  <line x1="530" y1="290" x2="300" y2="325" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="295,319 305,325 300,331" fill="#10b981"/>

  <text x="255" y="378" text-anchor="middle" font-size="11" fill="#10b981" font-weight="600">Recovered!</text>
</svg>