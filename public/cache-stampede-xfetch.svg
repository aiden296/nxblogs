<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="probGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dcfce7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#fef9c3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecaca;stop-opacity:1" />
    </linearGradient>
    <marker id="axisArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#f9fafb" rx="8"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#111827">XFetch: Probabilistic Early Expiration</text>
  <text x="350" y="50" text-anchor="middle" font-size="11" fill="#6b7280">P(refresh) = β × gap × (−ln(random())) relative to time-to-expiry</text>

  <!-- Chart area -->
  <!-- X Axis -->
  <line x1="80" y1="310" x2="640" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <text x="360" y="345" text-anchor="middle" font-size="12" fill="#374151">Time →</text>

  <!-- Y Axis -->
  <line x1="80" y1="310" x2="80" y2="70" stroke="#374151" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <text x="35" y="190" text-anchor="middle" font-size="12" fill="#374151" transform="rotate(-90, 35, 190)">P(refresh)</text>

  <!-- Y axis labels -->
  <text x="70" y="314" text-anchor="end" font-size="10" fill="#6b7280">0%</text>
  <text x="70" y="194" text-anchor="end" font-size="10" fill="#6b7280">50%</text>
  <text x="70" y="84" text-anchor="end" font-size="10" fill="#6b7280">100%</text>

  <!-- X axis labels -->
  <text x="120" y="330" text-anchor="middle" font-size="10" fill="#6b7280">Cache SET</text>
  <text x="530" y="330" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">TTL Expiry</text>

  <!-- Background gradient zone -->
  <rect x="81" y="70" width="449" height="240" fill="url(#probGradient)" opacity="0.3" rx="2"/>

  <!-- TTL Expiry vertical line -->
  <line x1="530" y1="70" x2="530" y2="310" stroke="#dc2626" stroke-width="2" stroke-dasharray="5"/>

  <!-- Probability curve (exponential increase near expiry) -->
  <path d="M 120 308 C 200 307, 300 305, 370 300 C 410 295, 440 280, 460 260 C 475 240, 485 210, 495 170 C 505 130, 515 95, 530 75"
    fill="none" stroke="#7c3aed" stroke-width="3"/>

  <!-- Zone labels -->
  <!-- Safe zone -->
  <rect x="130" y="260" width="120" height="30" fill="#dcfce7" rx="4" stroke="#86efac" stroke-width="1"/>
  <text x="190" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Safe Zone</text>
  <text x="190" y="250" text-anchor="middle" font-size="9" fill="#166534">P ≈ 0%</text>

  <!-- Transition zone -->
  <rect x="330" y="220" width="100" height="30" fill="#fef3c7" rx="4" stroke="#fbbf24" stroke-width="1"/>
  <text x="380" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Rising Risk</text>

  <!-- Danger zone -->
  <rect x="470" y="90" width="50" height="30" fill="#fecaca" rx="4" stroke="#fca5a5" stroke-width="1"/>
  <text x="495" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">High P</text>

  <!-- Annotation: single request refreshes here -->
  <circle cx="480" cy="195" r="6" fill="#7c3aed" opacity="0.8"/>
  <line x1="486" y1="195" x2="560" y2="180" stroke="#7c3aed" stroke-width="1"/>
  <rect x="560" y="165" width="120" height="35" fill="white" rx="4" stroke="#7c3aed" stroke-width="1"/>
  <text x="620" y="180" text-anchor="middle" font-size="9" fill="#7c3aed">One request</text>
  <text x="620" y="193" text-anchor="middle" font-size="9" fill="#7c3aed">"wins" and refreshes</text>

  <!-- After expiry zone -->
  <rect x="535" y="70" width="95" height="240" fill="#fecaca" opacity="0.2"/>
  <text x="582" y="160" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">STAMPEDE</text>
  <text x="582" y="175" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="600">ZONE</text>
  <text x="582" y="195" text-anchor="middle" font-size="9" fill="#dc2626">(never reached</text>
  <text x="582" y="208" text-anchor="middle" font-size="9" fill="#dc2626">with XFetch)</text>

  <!-- Legend -->
  <rect x="100" y="360" width="500" height="30" fill="white" rx="4" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="375" x2="150" y2="375" stroke="#7c3aed" stroke-width="3"/>
  <text x="160" y="379" font-size="10" fill="#374151">Refresh probability curve</text>
  <line x1="320" y1="375" x2="350" y2="375" stroke="#dc2626" stroke-width="2" stroke-dasharray="5"/>
  <text x="360" y="379" font-size="10" fill="#374151">TTL expiry deadline</text>
</svg>
