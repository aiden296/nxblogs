<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="420" fill="#f9fafb" rx="8"/>
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#111827">Reed-Solomon: Polynomial Interpolation</text>
  <text x="400" y="58" text-anchor="middle" font-size="13" fill="#6b7280">A degree k-1 polynomial is uniquely defined by k points</text>

  <!-- Coordinate system -->
  <!-- Y-axis -->
  <line x1="120" y1="80" x2="120" y2="340" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="114,80 126,80 120,68" fill="#d1d5db"/>
  <text x="110" y="75" text-anchor="end" font-size="11" fill="#9ca3af">f(x)</text>

  <!-- X-axis -->
  <line x1="100" y1="320" x2="720" y2="320" stroke="#d1d5db" stroke-width="1.5"/>
  <polygon points="720,314 720,326 732,320" fill="#d1d5db"/>
  <text x="738" y="325" font-size="11" fill="#9ca3af">x</text>

  <!-- Grid lines (subtle) -->
  <line x1="200" y1="315" x2="200" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="200" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">1</text>
  <line x1="300" y1="315" x2="300" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="300" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">2</text>
  <line x1="400" y1="315" x2="400" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">3</text>
  <line x1="500" y1="315" x2="500" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="500" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">4</text>
  <line x1="600" y1="315" x2="600" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="600" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">5</text>
  <line x1="700" y1="315" x2="700" y2="325" stroke="#e5e7eb" stroke-width="1"/>
  <text x="700" y="338" text-anchor="middle" font-size="10" fill="#9ca3af">6</text>

  <!-- Polynomial curve (degree 3, smooth S-curve through 6 points) -->
  <!-- Points: (1,200), (2,140), (3,230), (4,120), (5,180), (6,100) -->
  <!-- In SVG coords: x1=200,y=200; x2=300,y=220; x3=400,y=150; x4=500,y=240; x5=600,y=190; x6=700,y=260 -->
  <path d="M 160,245 C 180,235 190,218 200,200 C 220,170 260,215 300,220 C 340,225 360,160 400,150 C 440,140 470,235 500,240 C 530,245 560,200 600,190 C 640,180 670,255 710,265" stroke="#8b5cf6" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- Data points (blue filled circles) -->
  <circle cx="200" cy="200" r="10" fill="#3b82f6" stroke="white" stroke-width="2"/>
  <text x="200" y="188" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">d1</text>

  <circle cx="300" cy="220" r="10" fill="#3b82f6" stroke="white" stroke-width="2"/>
  <text x="300" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">d2</text>

  <circle cx="400" cy="150" r="10" fill="#3b82f6" stroke="white" stroke-width="2"/>
  <text x="400" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">d3</text>

  <circle cx="500" cy="240" r="10" fill="#3b82f6" stroke="white" stroke-width="2"/>
  <text x="500" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">d4</text>

  <!-- Parity points (amber filled circles) -->
  <circle cx="600" cy="190" r="10" fill="#f59e0b" stroke="white" stroke-width="2"/>
  <text x="600" y="178" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">p1</text>

  <circle cx="700" cy="265" r="10" fill="#f59e0b" stroke="white" stroke-width="2"/>
  <text x="700" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#f59e0b">p2</text>

  <!-- Dashed vertical lines from points to x-axis -->
  <line x1="200" y1="200" x2="200" y2="315" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="300" y1="220" x2="300" y2="315" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="400" y1="150" x2="400" y2="315" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="500" y1="240" x2="500" y2="315" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="600" y1="190" x2="600" y2="315" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="700" y1="265" x2="700" y2="315" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Legend -->
  <circle cx="240" cy="370" r="6" fill="#3b82f6"/>
  <text x="252" y="374" font-size="12" fill="#4b5563">Data points (k=4)</text>
  <circle cx="400" cy="370" r="6" fill="#f59e0b"/>
  <text x="412" y="374" font-size="12" fill="#4b5563">Parity points (m=2)</text>
  <line x1="540" y1="370" x2="570" y2="370" stroke="#8b5cf6" stroke-width="2.5" opacity="0.7"/>
  <text x="578" y="374" font-size="12" fill="#4b5563">Polynomial f(x)</text>

  <!-- Bottom note -->
  <text x="400" y="405" text-anchor="middle" font-size="13" fill="#6b7280" font-style="italic">Lose any 2 points &#x2192; still have 4 points &#x2192; reconstruct the unique polynomial</text>
</svg>