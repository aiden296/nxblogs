<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="850" height="480" fill="#f9fafb" rx="8"/>

  <text x="425" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Replication vs Erasure Coding</text>

  <!-- Divider -->
  <line x1="425" y1="50" x2="425" y2="355" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT COLUMN: 3-Copy Replication ===== -->
  <text x="210" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">3-Copy Replication</text>

  <!-- Original data block -->
  <rect x="155" y="80" width="110" height="44" fill="#3b82f6" rx="6"/>
  <text x="210" y="100" text-anchor="middle" font-size="12" fill="white" font-weight="600">Original Data</text>
  <text x="210" y="116" text-anchor="middle" font-size="11" fill="#bfdbfe">100 MB</text>

  <!-- Arrow down -->
  <line x1="210" y1="124" x2="210" y2="148" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="204,148 216,148 210,160" fill="#94a3b8"/>

  <!-- 3 copies stacked -->
  <rect x="120" y="165" width="180" height="44" fill="#3b82f6" rx="6"/>
  <text x="210" y="185" text-anchor="middle" font-size="12" fill="white" font-weight="600">Copy 1</text>
  <text x="210" y="201" text-anchor="middle" font-size="10" fill="#bfdbfe">100 MB</text>

  <rect x="120" y="215" width="180" height="44" fill="#3b82f6" rx="6"/>
  <text x="210" y="235" text-anchor="middle" font-size="12" fill="white" font-weight="600">Copy 2</text>
  <text x="210" y="251" text-anchor="middle" font-size="10" fill="#bfdbfe">100 MB</text>

  <rect x="120" y="265" width="180" height="44" fill="#3b82f6" rx="6"/>
  <text x="210" y="285" text-anchor="middle" font-size="12" fill="white" font-weight="600">Copy 3</text>
  <text x="210" y="301" text-anchor="middle" font-size="10" fill="#bfdbfe">100 MB</text>

  <!-- Stats -->
  <rect x="110" y="320" width="200" height="42" fill="#eff6ff" rx="6" stroke="#bfdbfe" stroke-width="1"/>
  <text x="210" y="337" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="600">Total: 300 MB</text>
  <text x="210" y="354" text-anchor="middle" font-size="11" fill="#1e40af">Overhead: 200% | Tolerance: 2 failures</text>

  <!-- ===== RIGHT COLUMN: Erasure Coding (4+2) ===== -->
  <text x="640" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#8b5cf6">Erasure Coding (4+2)</text>

  <!-- Original data block -->
  <rect x="585" y="80" width="110" height="44" fill="#8b5cf6" rx="6"/>
  <text x="640" y="100" text-anchor="middle" font-size="12" fill="white" font-weight="600">Original Data</text>
  <text x="640" y="116" text-anchor="middle" font-size="11" fill="#ddd6fe">100 MB</text>

  <!-- Arrow splitting -->
  <line x1="640" y1="124" x2="640" y2="148" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="634,148 646,148 640,160" fill="#94a3b8"/>

  <!-- Split label -->
  <text x="640" y="173" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Split + Encode</text>

  <!-- 4 data chunks in a 2x2 grid -->
  <rect x="470" y="185" width="78" height="38" fill="#3b82f6" rx="5"/>
  <text x="509" y="203" text-anchor="middle" font-size="11" fill="white" font-weight="600">d1</text>
  <text x="509" y="217" text-anchor="middle" font-size="9" fill="#bfdbfe">25 MB</text>

  <rect x="554" y="185" width="78" height="38" fill="#3b82f6" rx="5"/>
  <text x="593" y="203" text-anchor="middle" font-size="11" fill="white" font-weight="600">d2</text>
  <text x="593" y="217" text-anchor="middle" font-size="9" fill="#bfdbfe">25 MB</text>

  <rect x="638" y="185" width="78" height="38" fill="#3b82f6" rx="5"/>
  <text x="677" y="203" text-anchor="middle" font-size="11" fill="white" font-weight="600">d3</text>
  <text x="677" y="217" text-anchor="middle" font-size="9" fill="#bfdbfe">25 MB</text>

  <rect x="722" y="185" width="78" height="38" fill="#3b82f6" rx="5"/>
  <text x="761" y="203" text-anchor="middle" font-size="11" fill="white" font-weight="600">d4</text>
  <text x="761" y="217" text-anchor="middle" font-size="9" fill="#bfdbfe">25 MB</text>

  <!-- Data label -->
  <text x="560" y="242" font-size="10" fill="#3b82f6" font-weight="600">Data shards (4 x 25 MB)</text>

  <!-- 2 parity chunks -->
  <rect x="530" y="255" width="100" height="38" fill="#f59e0b" rx="5"/>
  <text x="580" y="273" text-anchor="middle" font-size="11" fill="white" font-weight="600">p1</text>
  <text x="580" y="287" text-anchor="middle" font-size="9" fill="#fef3c7">25 MB</text>

  <rect x="640" y="255" width="100" height="38" fill="#f59e0b" rx="5"/>
  <text x="690" y="273" text-anchor="middle" font-size="11" fill="white" font-weight="600">p2</text>
  <text x="690" y="287" text-anchor="middle" font-size="9" fill="#fef3c7">25 MB</text>

  <!-- Parity label -->
  <text x="560" y="310" font-size="10" fill="#f59e0b" font-weight="600">Parity shards (2 x 25 MB)</text>

  <!-- Stats -->
  <rect x="540" y="320" width="200" height="42" fill="#faf5ff" rx="6" stroke="#ddd6fe" stroke-width="1"/>
  <text x="640" y="337" text-anchor="middle" font-size="11" fill="#6d28d9" font-weight="600">Total: 150 MB</text>
  <text x="640" y="354" text-anchor="middle" font-size="11" fill="#6d28d9">Overhead: 50% | Tolerance: 2 failures</text>

  <!-- ===== BOTTOM: Comparison bar chart ===== -->
  <rect x="50" y="380" width="750" height="90" fill="#ffffff" rx="10" stroke="#e2e8f0" stroke-width="1"/>

  <text x="425" y="400" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Storage Comparison</text>

  <!-- Replication bar -->
  <text x="100" y="428" text-anchor="end" font-size="11" fill="#475569" font-weight="600">Replication</text>
  <rect x="110" y="415" width="450" height="20" fill="#3b82f6" rx="4"/>
  <text x="570" y="430" font-size="11" fill="#3b82f6" font-weight="700">300 MB</text>

  <!-- EC bar -->
  <text x="100" y="455" text-anchor="end" font-size="11" fill="#475569" font-weight="600">Erasure Coding</text>
  <rect x="110" y="442" width="225" height="20" fill="#8b5cf6" rx="4"/>
  <text x="345" y="457" font-size="11" fill="#8b5cf6" font-weight="700">150 MB</text>

  <!-- Savings callout -->
  <rect x="600" y="430" width="185" height="30" fill="#d1fae5" rx="15"/>
  <text x="692" y="450" text-anchor="middle" font-size="11" fill="#065f46" font-weight="700">50% less storage, same fault tolerance</text>
</svg>