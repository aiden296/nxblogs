<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" font-family="system-ui, -apple-system, sans-serif">
  <text x="490" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">S3 Storage Classes Overview</text>

  <rect x="20" y="55" width="300" height="410" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#1d4ed8">Standard Group</text>
  <text x="170" y="105" text-anchor="middle" font-size="11" fill="#64748b">Frequently &amp; infrequently accessed data</text>

  <rect x="40" y="120" width="260" height="80" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">S3 Standard</text>
  <text x="170" y="165" text-anchor="middle" font-size="11" fill="#64748b">Default class, high performance</text>
  <text x="170" y="183" text-anchor="middle" font-size="11" fill="#64748b">99.99% availability, >= 3 AZs</text>

  <rect x="40" y="215" width="260" height="80" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="240" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">S3 Standard-IA</text>
  <text x="170" y="260" text-anchor="middle" font-size="11" fill="#64748b">Infrequent access, lower storage cost</text>
  <text x="170" y="278" text-anchor="middle" font-size="11" fill="#64748b">99.9% availability, >= 3 AZs</text>

  <rect x="40" y="310" width="260" height="80" rx="8" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="170" y="335" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">S3 One Zone-IA</text>
  <text x="170" y="355" text-anchor="middle" font-size="11" fill="#64748b">Single AZ, lowest Standard cost</text>
  <text x="170" y="373" text-anchor="middle" font-size="11" fill="#64748b">99.5% availability, 1 AZ</text>

  <rect x="340" y="55" width="300" height="410" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="490" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#0e7490">Glacier Group</text>
  <text x="490" y="105" text-anchor="middle" font-size="11" fill="#64748b">Long-term archival storage</text>

  <rect x="360" y="120" width="260" height="80" rx="8" fill="white" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="490" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#155e75">Glacier Instant Retrieval</text>
  <text x="490" y="165" text-anchor="middle" font-size="11" fill="#64748b">Millisecond retrieval, archive pricing</text>
  <text x="490" y="183" text-anchor="middle" font-size="11" fill="#64748b">99.9% availability, >= 3 AZs</text>

  <rect x="360" y="215" width="260" height="80" rx="8" fill="white" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="490" y="240" text-anchor="middle" font-size="14" font-weight="600" fill="#155e75">Glacier Flexible Retrieval</text>
  <text x="490" y="260" text-anchor="middle" font-size="11" fill="#64748b">Minutes to hours retrieval</text>
  <text x="490" y="278" text-anchor="middle" font-size="11" fill="#64748b">99.99% availability, >= 3 AZs</text>

  <rect x="360" y="310" width="260" height="80" rx="8" fill="white" stroke="#67e8f9" stroke-width="1.5"/>
  <text x="490" y="335" text-anchor="middle" font-size="14" font-weight="600" fill="#155e75">Glacier Deep Archive</text>
  <text x="490" y="355" text-anchor="middle" font-size="11" fill="#64748b">Lowest cost, 12-48 hour retrieval</text>
  <text x="490" y="373" text-anchor="middle" font-size="11" fill="#64748b">99.99% availability, >= 3 AZs</text>

  <rect x="660" y="55" width="300" height="410" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="810" y="85" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">Intelligent-Tiering</text>
  <text x="810" y="105" text-anchor="middle" font-size="11" fill="#64748b">Automatic cost optimization</text>

  <rect x="680" y="120" width="260" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="810" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Frequent Access Tier</text>
  <text x="810" y="160" text-anchor="middle" font-size="10" fill="#64748b">Default tier, same as Standard</text>

  <rect x="680" y="182" width="260" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="810" y="205" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Infrequent Access Tier</text>
  <text x="810" y="222" text-anchor="middle" font-size="10" fill="#64748b">After 30 days not accessed</text>

  <rect x="680" y="244" width="260" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="810" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Archive Instant Access</text>
  <text x="810" y="284" text-anchor="middle" font-size="10" fill="#64748b">After 90 days not accessed</text>

  <rect x="680" y="306" width="260" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="810" y="329" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Archive Access</text>
  <text x="810" y="346" text-anchor="middle" font-size="10" fill="#64748b">Optional, 90-730 days</text>

  <rect x="680" y="368" width="260" height="50" rx="8" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="810" y="391" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Deep Archive Access</text>
  <text x="810" y="408" text-anchor="middle" font-size="10" fill="#64748b">Optional, 180-730 days</text>

  <line x1="170" y1="55" x2="170" y2="50" stroke="#3b82f6" stroke-width="2"/>
  <line x1="490" y1="55" x2="490" y2="50" stroke="#06b6d4" stroke-width="2"/>
  <line x1="810" y1="55" x2="810" y2="50" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="170" y1="50" x2="810" y2="50" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="170" cy="50" r="3" fill="#3b82f6"/>
  <circle cx="490" cy="50" r="3" fill="#06b6d4"/>
  <circle cx="810" cy="50" r="3" fill="#8b5cf6"/>
  <circle cx="490" cy="44" r="3" fill="#1e293b"/>
  <line x1="490" y1="44" x2="490" y2="35" stroke="#1e293b" stroke-width="2"/>
</svg>