<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" font-family="system-ui, -apple-system, sans-serif">
  <rect width="850" height="450" fill="#f9fafb" rx="8"/>

  <text x="425" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Encoding Matrix Multiplication</text>

  <!-- Encoding Matrix -->
  <text x="60" y="65" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="600">Encoding Matrix</text>

  <!-- Left bracket -->
  <path d="M18,78 L10,78 L10,258 L18,258" stroke="#475569" stroke-width="2" fill="none"/>

  <!-- Identity rows (light blue bg) -->
  <rect x="20" y="78" width="160" height="30" fill="#dbeafe" rx="3"/>
  <rect x="20" y="110" width="160" height="30" fill="#dbeafe" rx="3"/>
  <rect x="20" y="142" width="160" height="30" fill="#dbeafe" rx="3"/>
  <rect x="20" y="174" width="160" height="30" fill="#dbeafe" rx="3"/>

  <!-- Parity rows (light amber bg) -->
  <rect x="20" y="210" width="160" height="30" fill="#fef3c7" rx="3"/>
  <rect x="20" y="242" width="160" height="30" fill="#fef3c7" rx="3"/>

  <!-- Right bracket -->
  <path d="M172,78 L180,78 L180,258 L172,258" stroke="#475569" stroke-width="2" fill="none"/>

  <!-- Identity matrix values -->
  <text x="45" y="98" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">1</text>
  <text x="80" y="98" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="115" y="98" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="150" y="98" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>

  <text x="45" y="130" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="80" y="130" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">1</text>
  <text x="115" y="130" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="150" y="130" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>

  <text x="45" y="162" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="80" y="162" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="115" y="162" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">1</text>
  <text x="150" y="162" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>

  <text x="45" y="194" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="80" y="194" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="115" y="194" text-anchor="middle" font-size="13" fill="#94a3b8">0</text>
  <text x="150" y="194" text-anchor="middle" font-size="13" fill="#1e293b" font-weight="600">1</text>

  <!-- Parity coefficients -->
  <text x="45" y="230" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">1</text>
  <text x="80" y="230" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">2</text>
  <text x="115" y="230" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">-1</text>
  <text x="150" y="230" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">4</text>

  <text x="45" y="262" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">-1</text>
  <text x="80" y="262" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">5</text>
  <text x="115" y="262" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">1</text>
  <text x="150" y="262" text-anchor="middle" font-size="13" fill="#92400e" font-weight="600">-3</text>

  <!-- Labels for matrix sections -->
  <text x="200" y="145" font-size="10" fill="#6366f1" font-weight="600">Identity</text>
  <text x="200" y="158" font-size="10" fill="#6366f1">(preserves data)</text>

  <text x="200" y="232" font-size="10" fill="#f59e0b" font-weight="600">Parity</text>
  <text x="200" y="245" font-size="10" fill="#f59e0b">coefficients</text>

  <!-- Dashed line separating identity from parity -->
  <line x1="20" y1="206" x2="180" y2="206" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Multiplication sign -->
  <text x="310" y="175" text-anchor="middle" font-size="28" fill="#475569" font-weight="700">x</text>

  <!-- Data vector -->
  <text x="385" y="65" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">Data</text>

  <!-- Left bracket -->
  <path d="M358,78 L350,78 L350,198 L358,198" stroke="#475569" stroke-width="2" fill="none"/>

  <rect x="360" y="78" width="50" height="30" fill="#dbeafe" rx="3"/>
  <rect x="360" y="110" width="50" height="30" fill="#dbeafe" rx="3"/>
  <rect x="360" y="142" width="50" height="30" fill="#dbeafe" rx="3"/>
  <rect x="360" y="174" width="50" height="30" fill="#dbeafe" rx="3"/>

  <!-- Right bracket -->
  <path d="M402,78 L410,78 L410,198 L402,198" stroke="#475569" stroke-width="2" fill="none"/>

  <text x="385" y="98" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d1</text>
  <text x="385" y="130" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d2</text>
  <text x="385" y="162" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d3</text>
  <text x="385" y="194" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d4</text>

  <!-- Equals sign -->
  <text x="460" y="175" text-anchor="middle" font-size="28" fill="#475569" font-weight="700">=</text>

  <!-- Result vector -->
  <text x="545" y="65" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Encoded</text>

  <!-- Left bracket -->
  <path d="M508,78 L500,78 L500,258 L508,258" stroke="#475569" stroke-width="2" fill="none"/>

  <!-- Data results (blue) -->
  <rect x="510" y="78" width="70" height="30" fill="#dbeafe" rx="3"/>
  <rect x="510" y="110" width="70" height="30" fill="#dbeafe" rx="3"/>
  <rect x="510" y="142" width="70" height="30" fill="#dbeafe" rx="3"/>
  <rect x="510" y="174" width="70" height="30" fill="#dbeafe" rx="3"/>

  <!-- Parity results (amber) -->
  <rect x="510" y="210" width="70" height="30" fill="#fef3c7" rx="3"/>
  <rect x="510" y="242" width="70" height="30" fill="#fef3c7" rx="3"/>

  <!-- Right bracket -->
  <path d="M572,78 L580,78 L580,258 L572,258" stroke="#475569" stroke-width="2" fill="none"/>

  <text x="545" y="98" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d1</text>
  <text x="545" y="130" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d2</text>
  <text x="545" y="162" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d3</text>
  <text x="545" y="194" text-anchor="middle" font-size="14" fill="#3b82f6" font-weight="600">d4</text>
  <text x="545" y="230" text-anchor="middle" font-size="14" fill="#f59e0b" font-weight="600">p1</text>
  <text x="545" y="262" text-anchor="middle" font-size="14" fill="#f59e0b" font-weight="600">p2</text>

  <!-- Dashed line in result -->
  <line x1="510" y1="206" x2="580" y2="206" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Labels on result -->
  <text x="600" y="145" font-size="10" fill="#3b82f6" font-weight="600">Data shards</text>
  <text x="600" y="158" font-size="10" fill="#3b82f6">(unchanged)</text>
  <text x="600" y="232" font-size="10" fill="#f59e0b" font-weight="600">Parity shards</text>
  <text x="600" y="245" font-size="10" fill="#f59e0b">(computed)</text>

  <!-- Parity computation formulas -->
  <rect x="60" y="300" width="730" height="70" fill="#fff7ed" rx="8" stroke="#fed7aa" stroke-width="1"/>
  <text x="425" y="322" text-anchor="middle" font-size="11" fill="#92400e" font-weight="600">Parity Computation</text>

  <text x="425" y="342" text-anchor="middle" font-size="13" fill="#92400e" font-family="ui-monospace, monospace">
    p1 = 1 . d1 + 2 . d2 + (-1) . d3 + 4 . d4
  </text>
  <text x="425" y="362" text-anchor="middle" font-size="13" fill="#92400e" font-family="ui-monospace, monospace">
    p2 = (-1) . d1 + 5 . d2 + 1 . d3 + (-3) . d4
  </text>

  <!-- Bottom annotation -->
  <text x="425" y="410" text-anchor="middle" font-size="11" fill="#64748b">The identity submatrix ensures data shards are stored as-is.</text>
  <text x="425" y="426" text-anchor="middle" font-size="11" fill="#64748b">Parity shards are linear combinations of all data shards.</text>
</svg>