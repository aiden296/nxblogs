<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, sans-serif">
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Erasure Coding: 5-of-9 Scheme</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#94a3b8">Split into 5 data + 4 parity shards — any 5 can reconstruct the original object</text>

  <!-- Original Object -->
  <rect x="60" y="80" width="200" height="60" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="160" y="107" text-anchor="middle" font-size="15" font-weight="600" fill="#1e40af">Original Object</text>
  <text x="160" y="127" text-anchor="middle" font-size="11" fill="#64748b">e.g. report.pdf (50 MB)</text>

  <!-- Arrow right -->
  <line x1="260" y1="110" x2="311" y2="110" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="306,104 306,116 316,110" fill="#64748b"/>
  <text x="288" y="100" text-anchor="middle" font-size="10" fill="#64748b">encode</text>

  <!-- 9 Shards -->
  <text x="510" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">9 Shards (each ~10 MB)</text>

  <!-- Data shards (blue) -->
  <rect x="320" y="90" width="75" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="357" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D1</text>

  <rect x="405" y="90" width="75" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="442" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D2</text>

  <rect x="490" y="90" width="75" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="527" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D3</text>

  <rect x="575" y="90" width="75" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="612" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D4</text>

  <rect x="660" y="90" width="75" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="697" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D5</text>

  <!-- Parity shards (purple) -->
  <rect x="320" y="140" width="75" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="357" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P1</text>

  <rect x="405" y="140" width="75" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="442" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P2</text>

  <rect x="490" y="140" width="75" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="527" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P3</text>

  <rect x="575" y="140" width="75" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="612" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P4</text>

  <!-- Legend -->
  <rect x="745" y="90" width="140" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="760" y="108" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="780" y="119" font-size="11" fill="#64748b">Data shard (5)</text>
  <rect x="760" y="132" width="14" height="14" rx="3" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="780" y="143" font-size="11" fill="#64748b">Parity shard (4)</text>
  <text x="760" y="168" font-size="10" fill="#94a3b8">Total: 9 shards</text>

  <!-- Distribution across AZs -->
  <text x="450" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Distributed Across 3 Availability Zones</text>

  <!-- AZ 1 -->
  <rect x="60" y="235" width="250" height="160" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="185" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Availability Zone 1</text>

  <rect x="80" y="275" width="65" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="112" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D1</text>
  <rect x="155" y="275" width="65" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="187" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D2</text>
  <rect x="230" y="275" width="65" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="262" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P1</text>

  <text x="185" y="350" text-anchor="middle" font-size="10" fill="#94a3b8">3 drives across different racks</text>
  <rect x="100" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="115" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="140" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="155" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="180" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="195" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>

  <!-- AZ 2 -->
  <rect x="325" y="235" width="250" height="160" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">Availability Zone 2</text>

  <rect x="345" y="275" width="65" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="377" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D3</text>
  <rect x="420" y="275" width="65" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="452" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D4</text>
  <rect x="495" y="275" width="65" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="527" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P2</text>

  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#94a3b8">3 drives across different racks</text>
  <rect x="365" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="380" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="405" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="420" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="445" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="460" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>

  <!-- AZ 3 -->
  <rect x="590" y="235" width="250" height="160" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="715" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Availability Zone 3</text>

  <rect x="610" y="275" width="65" height="40" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="642" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">D5</text>
  <rect x="685" y="275" width="65" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="717" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P3</text>
  <rect x="760" y="275" width="65" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="792" y="299" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">P4</text>

  <text x="715" y="350" text-anchor="middle" font-size="10" fill="#94a3b8">3 drives across different racks</text>
  <rect x="630" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="645" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="670" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="685" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>
  <rect x="710" y="360" width="30" height="24" rx="4" fill="#e2e8f0"/>
  <text x="725" y="376" text-anchor="middle" font-size="8" fill="#64748b">HDD</text>

  <!-- Comparison box -->
  <rect x="60" y="420" width="380" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="445" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">3x Replication (Traditional)</text>
  <text x="250" y="468" text-anchor="middle" font-size="12" fill="#64748b">50 MB object x 3 copies = 150 MB stored</text>
  <text x="250" y="488" text-anchor="middle" font-size="12" fill="#64748b">Storage overhead: 3.0x</text>
  <text x="250" y="508" text-anchor="middle" font-size="12" fill="#64748b">Tolerate: 2 failures</text>
  <text x="250" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Cost: $$$</text>

  <rect x="460" y="420" width="380" height="120" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="445" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">5-of-9 Erasure Coding (S3)</text>
  <text x="650" y="468" text-anchor="middle" font-size="12" fill="#64748b">50 MB object x 1.8 = 90 MB stored</text>
  <text x="650" y="488" text-anchor="middle" font-size="12" fill="#64748b">Storage overhead: 1.8x</text>
  <text x="650" y="508" text-anchor="middle" font-size="12" fill="#64748b">Tolerate: 4 failures</text>
  <text x="650" y="528" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Cost: $ (40% savings)</text>
</svg>